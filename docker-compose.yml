# docker-compose.yml
services:
  grynya-workspace:
    build: .
    container_name: grynya-workspace
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    tty: true
    stdin_open: true
    networks:
      - grynya-network

networks:
  grynya-network:
    driver: bridge
